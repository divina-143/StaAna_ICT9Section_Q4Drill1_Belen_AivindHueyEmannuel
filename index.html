<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q4 Drill 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card p-4 shadow main-box text-light text-center">

<h2 class="text-warning">Electricity Consumption Classifier</h2>

<p class="small">Enter your monthly electricity usage (kWh) to check your category.</p>

<hr>

<label>Electricity Usage (kWh)</label>
<input type="number" id="consumption" class="form-control mb-3" placeholder="e.g. 250">

<button class="btn btn-warning w-100" onclick="checkUsage()">
Check Classification
</button>

<hr>

<div id="output" class="result-box p-3">
Result will appear here
</div>

<p class="small mt-3">
Source:
<a href="https://www.noaa.gov/" target="_blank">Energy Consumption Reference</a>
</p>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
